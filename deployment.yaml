# Dans deployment.yaml, sous la section containers:
      containers:
      - name: flask-container
        image: myapp:latest
        env:
        - name: DB_HOST
          value: "postgres-service"
        - name: DB_NAME
          value: "devopsdb"
        - name: DB_PASS
          value: "mypassword"
        ports:
        - containerPort: 5000
