name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Minikube
        uses: medyagh/setup-minikube@latest
        with:
          # On force la version 1.28.0 pour éviter l'erreur K8S_OLD_UNSUPPORTED
          kubernetes-version: 'v1.28.0'
          driver: docker

      - name: Build image inside Minikube
        run: |
          # On lie le docker local à minikube
          eval $(minikube -p minikube docker-env)
          docker build -t myapp:latest .

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f deployment.yaml
          kubectl apply -f service.yaml

      - name: Wait for Pods to be Ready
        run: |
          # Cette étape attend que Flask soit vraiment prêt avant de continuer
          kubectl rollout status deployment/flask-app-deployment --timeout=90s

      - name: Test the Application
        run: |
          # On vérifie que l'app répond "Hello"
          NODE_IP=$(minikube ip)
          NODE_PORT=$(kubectl get svc flask-app-service -o jsonpath='{.spec.ports[0].nodePort}')
          curl -s http://$NODE_IP:$NODE_PORT | grep "Hello"
