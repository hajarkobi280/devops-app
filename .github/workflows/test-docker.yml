name: Test Docker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Build Docker image
      run: |
        docker build -t devops-app:latest .
        docker images
    
    - name: Run container
      run: |
        docker run -d -p 5000:5000 --name myapp devops-app:latest
        sleep 5
    
    - name: Test
      run: |
        curl -f http://localhost:5000 && echo "✅ App works in Docker!"
