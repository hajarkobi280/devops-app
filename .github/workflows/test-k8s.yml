name: Test Kubernetes

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Start Minikube
      uses: medyagh/setup-minikube@latest
      with:
        driver: docker
    
    - name: Build image in Minikube
      run: |
        eval $(minikube docker-env)
        docker build -t devops-app:latest .
        docker images | grep devops-app
    
    - name: Deploy to Kubernetes
      run: |
        # Créer un déploiement simple
        kubectl create deployment test-app --image=devops-app:latest --port=5000
        kubectl expose deployment test-app --port=80 --target-port=5000 --type=ClusterIP
        kubectl wait --for=condition=ready pods --all --timeout=120s
        kubectl get pods
        kubectl get svc
    
    - name: Test application
      run: |
        kubectl port-forward service/test-app 8080:80 &
        sleep 15
        echo "Testing application..."
        if curl -f http://localhost:8080; then
          echo "✅ Kubernetes test passed!"
        else
          echo "❌ Test failed"
          kubectl logs -l app=test-app
          exit 1
        fi
