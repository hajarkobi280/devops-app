name: Test Kubernetes

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Start Minikube
      uses: medyagh/setup-minikube@latest
      with:
        driver: docker
        kubernetes-version: v1.27.3
    
    - name: Build image in Minikube
      run: |
        eval $(minikube docker-env)
        docker build -t devops-app:latest .
    
    - name: Deploy with your manifest
      run: |
        # Utiliser ton fichier de déploiement
        kubectl apply -f k8s/deployment.yaml
        kubectl wait --for=condition=ready pods --all --timeout=120s
        kubectl get pods
        kubectl get svc
    
    - name: Test endpoints
      run: |
        kubectl port-forward service/devops-app-service 8080:80 &
        sleep 10
        echo "Testing / endpoint..."
        curl -f http://localhost:8080
        echo "Testing /health endpoint..."
        curl -f http://localhost:8080/health || echo "Health endpoint not implemented"
        echo "✅ All tests passed!"
