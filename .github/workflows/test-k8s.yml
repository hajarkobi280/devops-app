name: Test Kubernetes

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Start Minikube
      uses: medyagh/setup-minikube@latest
      with:
        driver: docker
        kubernetes-version: v1.27.3
    
    - name: Build image in Minikube
      run: |
        eval $(minikube docker-env)
        docker build -t devops-app:latest .
    
    - name: Deploy app
      run: |
        kubectl create deployment devops-app --image=devops-app:latest --port=5000
        kubectl expose deployment devops-app --port=80 --target-port=5000 --type=ClusterIP
        kubectl wait --for=condition=ready pods --all --timeout=120s
        kubectl get pods
        kubectl get svc
    
    - name: Test app
      run: |
        kubectl port-forward service/devops-app 8080:80 &
        sleep 10
        curl -f http://localhost:8080
        echo "✅ Kubernetes test passed!"
