name: Deploy with Minikube

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Start Minikube
      uses: medyagh/setup-minikube@latest
      with:
        driver: docker
        kubernetes-version: v1.27.3
        start-args: '--cpus=2 --memory=4096'
    
    - name: Verify cluster
      run: |
        kubectl cluster-info
        kubectl get nodes
    
    - name: Build and load image
      run: |
        eval $(minikube docker-env)
        docker build -t devops-app:latest .
        docker images | grep devops-app
    
    - name: Deploy
      run: |
        kubectl apply -f k8s/deployment.yaml
        kubectl wait --for=condition=ready pods --all --timeout=180s
        kubectl get pods
        kubectl get svc
    
    - name: Test
      run: |
        kubectl port-forward service/devops-app-service 8080:80 &
        sleep 15
        curl -f http://localhost:8080 && echo "✅ Deployment successful!"
