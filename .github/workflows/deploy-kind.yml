name: Deploy with Kind

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4  # v3 → v4
    
    - name: Setup kubectl
      uses: azure/setup-kubectl@v4  # déjà v4
    
    - name: Create Kind Cluster
      uses: helm/kind-action@v1
      with:
        version: v0.20.0
        node_image: kindest/node:v1.27.3
        wait: 120s
        config: |
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
          - role: control-plane
          - role: worker
          - role: worker
    
    - name: Verify cluster
      run: |
        kubectl cluster-info
        kubectl get nodes
    
    - name: Build Docker Image
      run: |
        docker build -t devops-app:latest .
    
    - name: Load Image to Kind
      run: |
        kind load docker-image devops-app:latest --name kind
    
    - name: Deploy
      run: |
        kubectl apply -f k8s/deployment.yaml
        kubectl wait --for=condition=ready pods --all --timeout=180s
        kubectl get pods
        kubectl get svc
    
    - name: Test
      run: |
        kubectl port-forward service/devops-app-service 8080:80 &
        sleep 15
        curl -f http://localhost:8080 && echo "✅ Deployment successful!"
