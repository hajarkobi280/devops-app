name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Minikube
        uses: medyagh/setup-minikube@latest
        with:
          kubernetes-version: 'v1.28.0'
          driver: docker

      - name: Build Image inside Minikube
        run: |
          # Lie Docker à l'environnement Minikube
          eval $(minikube -p minikube docker-env)
          docker build -t myapp:latest .

      - name: Deploy to Kubernetes
        run: |
          # Correction CRITIQUE pour le Timeout
          minikube update-context
          
          # Appliquer les configurations
          kubectl apply -f deployment.yaml
          kubectl apply -f service.yaml

      - name: Wait for Pods to be Ready
        run: |
          # Attend que Flask soit prêt (max 90s)
          kubectl rollout status deployment/flask-app-deployment --timeout=90s

      - name: Test Endpoint
        run: |
          # Récupère l'URL de test via Minikube
          NODE_IP=$(minikube ip)
          NODE_PORT=$(kubectl get svc flask-app-service -o jsonpath='{.spec.ports[0].nodePort}')
          
          echo "Testing at http://$NODE_IP:$NODE_PORT"
          curl -s http://$NODE_IP:$NODE_PORT | grep "Hello"
