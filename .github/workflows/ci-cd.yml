name: CI-CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # ÉTAPE 1 : TEST (Vérifie si le code est correct)
  Test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install flask psycopg2-binary
      - name: Check Syntax
        run: python -m py_compile app.py

  # ÉTAPE 2 : BUILD (Crée l'image Docker)
  Build:
    needs: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/flask-app:latest

  # ÉTAPE 3 : DEPLOY (Met à jour Kubernetes)
  Deploy:
    needs: Build
    runs-on: ubuntu-latest
    steps:
      - name: Status Update
        run: echo "Build terminé avec succès ! Prêt pour le déploiement sur AWS."
